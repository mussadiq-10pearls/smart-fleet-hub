<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Fleet Safety & Compliance Hub</title>
  <style>
    :root {
      --bg: #f4f6f9;
      --card-bg: #ffffff;
      --primary: #2c3e50;
      --accent: #3498db;
      --danger: #e74c3c;
      --success: #2ecc71;
      --warning: #f39c12;
      --text: #333;
      --radius: 10px;
      --shadow: 0 4px 12px rgba(0,0,0,0.05);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 30px 20px;
      line-height: 1.5;
    }
    .container { max-width: 1300px; margin: 0 auto; }

    header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 30px; flex-wrap: wrap; gap: 15px;
    }
    h1 { font-size: 2rem; color: var(--primary); }
    .refresh-btn {
      background: var(--accent); color: white; border: none;
      padding: 10px 20px; border-radius: var(--radius); cursor: pointer;
      font-size: 0.95rem; font-weight: 600; transition: background 0.2s;
    }
    .refresh-btn:hover { background: #2980b9; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px; margin-bottom: 30px;
    }
    .stat-card {
      background: var(--card-bg); padding: 20px; border-radius: var(--radius);
      box-shadow: var(--shadow); text-align: center;
    }
    .stat-card .value { font-size: 2.2rem; font-weight: 700; margin-bottom: 5px; }
    .stat-card .label { font-size: 0.9rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card.accent { border-top: 4px solid var(--accent); }
    .stat-card.success { border-top: 4px solid var(--success); }
    .stat-card.warning { border-top: 4px solid var(--warning); }
    .stat-card.danger { border-top: 4px solid var(--danger); }

    .dashboard {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;
    }
    @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
    .card {
      background: var(--card-bg); padding: 20px; border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .card h2 { margin-bottom: 15px; color: var(--primary); }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #eee; }
    th { color: #666; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
    .violation { background-color: #ffeef0; }
    .score-high { color: var(--success); font-weight: bold; }
    .score-medium { color: var(--warning); font-weight: bold; }
    .score-low { color: var(--danger); font-weight: bold; }

    .most-safe {
      background: var(--card-bg); padding: 20px; border-radius: var(--radius);
      box-shadow: var(--shadow); margin-top: 20px; display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap;
    }
    .most-safe h3 { color: var(--primary); }
    .most-safe .driver { font-weight: 700; color: var(--success); font-size: 1.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🚛 Fleet Safety & Compliance Hub</h1>
      <div style="display: flex; gap: 10px; align-items: center;">
        <label for="vehicleSelect" style="font-weight:500;">Vehicle:</label>
        <select id="vehicleSelect" style="padding: 8px; border-radius: 6px; border: 1px solid #ccc;">
          <option value="">All Vehicles</option>
          <option value="V-101">V-101</option>
          <option value="V-202">V-202</option>
          <option value="V-303">V-303</option>
          <option value="V-404">V-404</option>
          <option value="V-505">V-505</option>
        </select>
        <button class="refresh-btn" onclick="refreshData()">🔄 Refresh Now</button>
      </div>
    </header>

    <!-- KPI Cards -->
    <div class="stats-grid">
      <div class="stat-card accent">
        <div class="value" id="totalVehicles">--</div>
        <div class="label">Active Vehicles</div>
      </div>
      <div class="stat-card success">
        <div class="value" id="totalEvents">--</div>
        <div class="label">Telemetry Events</div>
      </div>
      <div class="stat-card warning">
        <div class="value" id="alertsCount">--</div>
        <div class="label">Recent Alerts</div>
      </div>
      <div class="stat-card danger">
        <div class="value" id="mostSafeDriver">--</div>
        <div class="label">Safest Driver</div>
      </div>
    </div>

    <!-- Data Tables -->
    <div class="dashboard">
      <div class="card">
        <h2>📡 Live Telemetry</h2>
        <table id="telemetryTable">
          <thead><tr><th>Vehicle</th><th>Time</th><th>Speed</th><th>Brake</th><th>Temp</th><th>Fuel</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="card">
        <h2>🏆 Safety Scores</h2>
        <table id="scoresTable">
          <thead><tr><th>Vehicle</th><th>Date</th><th>Score</th><th>Summary</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://jqobu1e2g5.execute-api.us-east-1.amazonaws.com";

    async function refreshData() {
      const vehicleId = document.getElementById('vehicleSelect').value;

      // Fetch telemetry
      let telemetryUrl = `${API_BASE}/telemetry`;
      if (vehicleId) telemetryUrl += `?vehicleId=${vehicleId}`;
      try {
        const resp = await fetch(telemetryUrl);
        const telemetry = await resp.json();
        renderTelemetry(telemetry);
        updateStats(telemetry);
      } catch (err) { console.error('Telemetry fetch error', err); }

      // Fetch scores
      try {
        const scoresResp = await fetch(`${API_BASE}/scores`);
        const scores = await scoresResp.json();
        renderScores(scores);
        updateSafestDriver(scores);
      } catch (err) { console.error('Scores fetch error', err); }
    }

    function renderTelemetry(data) {
      const tbody = document.querySelector('#telemetryTable tbody');
      tbody.innerHTML = '';
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No telemetry data</td></tr>';
        return;
      }
      data.forEach(item => {
        const row = document.createElement('tr');
        if (item.speed > 100 || item.harshBraking) row.classList.add('violation');
        const time = new Date(item.timestamp).toLocaleTimeString();
        row.innerHTML = `
          <td>${item.vehicleId}</td>
          <td>${time}</td>
          <td>${item.speed} km/h</td>
          <td>${item.harshBraking ? '⚠️ Harsh' : 'Normal'}</td>
          <td>${item.engineTemp} °C</td>
          <td>${item.fuelLevel}%</td>
        `;
        tbody.appendChild(row);
      });
    }

    function renderScores(data) {
      const tbody = document.querySelector('#scoresTable tbody');
      tbody.innerHTML = '';
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No scores yet</td></tr>';
        return;
      }
      data.forEach(item => {
        const row = document.createElement('tr');
        let scoreClass = 'score-low';
        if (item.score >= 80) scoreClass = 'score-high';
        else if (item.score >= 50) scoreClass = 'score-medium';
        row.innerHTML = `
          <td>${item.vehicleId}</td>
          <td>${item.summaryDate}</td>
          <td class="${scoreClass}">${item.score}</td>
          <td>${item.summary || '—'}</td>
        `;
        tbody.appendChild(row);
      });
    }

    function updateStats(telemetry) {
      const uniqueVehicles = new Set(telemetry.map(e => e.vehicleId)).size;
      document.getElementById('totalVehicles').textContent = uniqueVehicles;
      document.getElementById('totalEvents').textContent = telemetry.length;

      // Count recent alerts (harsh braking or speeding) in the telemetry dataset
      const alerts = telemetry.filter(e => e.speed > 100 || e.harshBraking).length;
      document.getElementById('alertsCount').textContent = alerts;
    }

    function updateSafestDriver(scores) {
      if (!scores.length) {
        document.getElementById('mostSafeDriver').textContent = '—';
        return;
      }
      // Find the driver with the highest score
      const safest = scores.reduce((prev, curr) => (prev.score > curr.score ? prev : curr));
      document.getElementById('mostSafeDriver').textContent = `${safest.vehicleId} (${safest.score})`;
    }

    // Auto-refresh every 30 seconds
    refreshData();
    setInterval(refreshData, 30000);
  </script>
</body>
</html>
